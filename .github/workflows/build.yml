name: Build and upload conda packages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      recipe:
        description: Single recipe directory (e.g. random123); empty = all
        type: string
        default: ''
      force:
        description: Drop --skip-existing (use to rebuild over the same version)
        type: boolean
        default: false

jobs:
  build:
    # TODO: pin to @main once https://github.com/ShipSoft/.github/pull/3 merges.
    uses: ShipSoft/.github/.github/workflows/rattler-build-and-upload.yml@ci/rattler-build-reusable-workflow
    with:
      recipe: ${{ inputs.recipe || '' }}
      force: ${{ inputs.force || false }}
      upload: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
      channel-name: ship
    secrets:
      prefix-dev-api-key: ${{ secrets.PREFIX_DEV_API_KEY }}
