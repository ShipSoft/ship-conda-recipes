name: Build and upload conda packages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.1

      - name: Build all packages (skip existing)
        run: |
          for pkg in $(bash ci/build-order.sh); do
            echo "::group::Building $pkg"
            pixi run rattler-build build \
              --recipe "recipes/$pkg" \
              --channel https://prefix.dev/ship \
              --channel conda-forge \
              --skip-existing=all
            echo "::endgroup::"
          done

      - name: Upload to prefix.dev
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          PREFIX_DEV_API_KEY: ${{ secrets.PREFIX_DEV_API_KEY }}
        run: |
          for pkg in output/linux-64/*.conda output/noarch/*.conda; do
            [ -f "$pkg" ] || continue
            pixi run rattler-build upload prefix \
              -c ship --skip-existing "$pkg"
          done
