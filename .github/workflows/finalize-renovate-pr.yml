name: Finalize renovate recipe PR

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'recipes/**/recipe.yaml'

permissions:
  contents: write
  pull-requests: write

jobs:
  finalize:
    if: github.actor == 'renovate[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Refresh sha256 and derive version for changed HEP-tag recipes
        run: |
          set -euo pipefail
          mapfile -t changed < <(
            git diff --name-only "origin/${{ github.base_ref }}...HEAD" \
              -- 'recipes/*/recipe.yaml'
          )
          if [ ${#changed[@]} -eq 0 ]; then
            echo "No changed recipe.yaml files; nothing to do."
            exit 0
          fi
          printf 'Changed recipes:\n%s\n' "${changed[@]}"
          ci/finalize-recipe-bump.sh "${changed[@]}"

      - name: Commit and push if anything changed
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "Recipes already in sync; no follow-up commit needed."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add recipes
          git commit -m 'chore(recipe): refresh sha256 and version after tag bump'
          git push
