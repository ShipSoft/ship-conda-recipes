[workspace]
name = "ship-conda-recipes"
description = "Conda recipes for SHiP experiment packages not available on conda-forge"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
rattler-build = ">=0.35"

[tasks]
# Build every recipe under recipes/. rattler-build resolves cross-recipe
# dependency order from the requirements: blocks; already-built packages
# are skipped.
build-all = "rattler-build build --recipe-dir recipes/ --skip-existing=all --channel https://prefix.dev/ship --channel conda-forge"

# Convenience shortcut for the recipe most actively iterated on. For any
# other recipe, run: pixi run rattler-build build --recipe recipes/<name>
# --channel https://prefix.dev/ship --channel conda-forge
build-aegir = "rattler-build build --recipe recipes/aegir --channel https://prefix.dev/ship --channel conda-forge"
