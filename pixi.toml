[workspace]
name = "ship-conda-recipes"
description = "Conda recipes for SHiP experiment packages not available on conda-forge"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
rattler-build = ">=0.35"

[tasks]
# Build individual recipes (use: pixi run build-<name>)
build-pythia6 = "rattler-build build --recipe recipes/pythia6"
build-vmc = "rattler-build build --recipe recipes/vmc"
build-vgm = "rattler-build build --recipe recipes/vgm"
build-rootegpythia6 = "rattler-build build --recipe recipes/rootegpythia6"
build-genfit = "rattler-build build --recipe recipes/genfit"
build-photospp = "rattler-build build --recipe recipes/photospp"
build-geant3 = "rattler-build build --recipe recipes/geant3"
build-geant4-vmc = "rattler-build build --recipe recipes/geant4-vmc"
build-fairroot = "rattler-build build --recipe recipes/fairroot"
build-fairship = "rattler-build build --recipe recipes/fairship"
build-cetmodules = "rattler-build build --recipe recipes/cetmodules"
build-jsonnet = "rattler-build build --recipe recipes/jsonnet"
build-geomodel = "rattler-build build --recipe recipes/geomodel"
build-phlex = "rattler-build build --recipe recipes/phlex"
build-ganga = "rattler-build build --recipe recipes/ganga"
build-gsl-lite = "rattler-build build --recipe recipes/gsl-lite"
build-mp-units = "rattler-build build --recipe recipes/mp-units"
build-shipdatamodel = "rattler-build build --recipe recipes/shipdatamodel"
build-shipgeometry = "rattler-build build --recipe recipes/shipgeometry"
build-shipgeometryservice = "rattler-build build --recipe recipes/shipgeometryservice"
build-random123 = "rattler-build build --recipe recipes/random123"
build-aegir = "rattler-build build --recipe recipes/aegir"
