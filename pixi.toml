[workspace]
name = "ship-conda-recipes"
description = "Conda recipes for SHiP experiment packages not available on conda-forge"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
rattler-build = ">=0.35"

[tasks]
# Build every recipe under recipes/. rattler-build resolves cross-recipe
# dependency order from the requirements: blocks; already-built packages
# are skipped.
build-all = "rattler-build build --recipe-dir recipes/ --skip-existing=all --channel https://prefix.dev/ship --channel conda-forge"

# Convenience shortcut for the recipe most actively iterated on. For any
# other recipe, run: pixi run rattler-build build --recipe recipes/<name>
# --channel https://prefix.dev/ship --channel conda-forge
build-aegir = "rattler-build build --recipe recipes/aegir --channel https://prefix.dev/ship --channel conda-forge"

# Linting / formatting toolchain. prek orchestrates the hooks; the tools come
# from this environment so versions are tracked in pixi.lock and run identically
# everywhere (including NixOS). See .pre-commit-config.yaml.
[feature.lint.dependencies]
prek = "*"
python = ">=3.11"
yamllint = "*"
shellcheck = "*"
reuse = "*"
commitizen = "*"

[feature.lint.tasks]
lint = "prek run --all-files"
# Install the git hooks and route them through `pixi run` so the conda-provided
# hook tools are on PATH at commit time (required on NixOS, where the tools are
# not runnable without pixi activation).
install-hooks = '''
prek install --hook-type pre-commit --hook-type commit-msg
hooks=$(git rev-parse --git-path hooks)
for h in pre-commit commit-msg; do
  sed -i 's#"$PREK" hook-impl#pixi run -e lint prek hook-impl#' "$hooks/$h"
done
'''

# GENIE toolchain for the production splines workflow (.github/workflows/
# splines.yml): gmkspl to generate cross-section splines, gspladd to merge
# them. Own channels so genie resolves from the ship channel first; its own
# environment so local `pixi install` / `pixi run build-all` stay lean and
# don't pull ROOT.
[feature.genie]
channels = ["https://prefix.dev/ship", "conda-forge"]
platforms = ["linux-64"]

[feature.genie.dependencies]
# Keep the version in sync with recipes/genie and recipes/genie-splines-ship.
genie = { version = "==3.06.02", build = "pythia6_*" }
genie-data = "*"

[environments]
lint = { features = ["lint"] }
genie = { features = ["genie"] }
