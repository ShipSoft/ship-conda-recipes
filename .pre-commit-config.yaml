# Run with prek (https://github.com/j178/prek), a drop-in pre-commit replacement.
# The hook tools are provided by the pixi `lint` environment (see pixi.toml), so
# versions are tracked in pixi.lock and the hooks run identically everywhere.
#
#   pixi run install-hooks   # one-off: install the git hooks
#   pixi run lint            # run all hooks on all files
repos:
  # prek runs these as native Rust builtins (no environment, fully portable).
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        # .patch files carry significant trailing whitespace / blank context
        # lines; fixing them would corrupt the hunks.
        exclude: \.patch$
      - id: end-of-file-fixer
        exclude: \.patch$
      - id: check-yaml
        args: [--unsafe]

  # Tools below come from the pixi `lint` environment via language: system.
  - repo: local
    hooks:
      - id: yamllint
        name: yamllint
        language: system
        entry: yamllint
        args: [-c, .yamllint.yml]
        types: [yaml]

      - id: shellcheck
        name: shellcheck
        language: system
        entry: shellcheck
        args: [--severity=warning]
        files: recipes/.*/build\.sh$

      - id: reuse
        name: reuse lint
        language: system
        entry: reuse lint
        pass_filenames: false
        always_run: true

      - id: commitizen
        name: commitizen (conventional commits)
        language: system
        entry: cz check --commit-msg-file
        stages: [commit-msg]
