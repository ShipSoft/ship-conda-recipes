context:
  version: "0.0.0.dev20260713+7608d7c"
  # HEAD of webbjm/acts shipdist-build as of 2026-07-13. The branch has
  # no release tag; the fork's version_number file is the sentinel
  # "999.999.999", so the conda version is a date-based snapshot.
  # Bumping: edit commit + sha256, set version to 0.0.0.dev<YYYYMMDD>+<sha7>,
  # and reset build.number to 0.
  commit: "946fd01b881b01c37cfd40a6880517ea8356ab6a"

package:
  name: acts-ship
  version: ${{ version }}

source:
  url: https://github.com/webbjm/acts/archive/${{ commit }}.tar.gz
  sha256: cd185dc83954b354afc83a0b47d4bac246caa611e813cc70eb355cd90e22bbe9

build:
  number: 1
  skip: win
  script: build.sh

requirements:
  build:
    - ${{ compiler('cxx') }}
    - sysroot_linux-64 2.17.*
    - cmake
    - make
    # Python codegen at build time (mirrors conda-forge acts-feedstock).
    - python 3.13.*
    - hatchling
    - numpy
    - sympy
    - particle
  host:
    # Cap Boost below 1.91: conda-forge `geant4` (and thus the geant4-vmc /
    # fairroot / fairship stack) is still built against libboost 1.90, so its
    # run_export pins libboost <1.91. An unpinned acts-ship picks up the newer
    # 1.91 and becomes co-installable-incompatible with the rest of the SHiP
    # stack. Track geant4's Boost until conda-forge migrates it to 1.91, then
    # drop this pin.
    - libboost-devel <1.91
    # ACTS requests `find_package(Eigen3 3.4.0 REQUIRED CONFIG)`; conda-forge
    # `eigen` jumped to 5.0.1 which rejects the 3.4.0 request (SameMajorVersion).
    - eigen 3.4.*
    - nlohmann_json
    - pybind11
    - python 3.13.*
    # find_package(HepMC3 3.2.4 REQUIRED CONFIG) at root CMakeLists.txt when
    # ACTS_BUILD_EXAMPLES=ON.
    #
    # Cap HepMC3 below 3.3.1 for the same reason as the Boost pin above:
    # conda-forge `photos` (pulled in by `evtgen`, a fairroot runtime dep) is
    # still built against hepmc3 3.3.0 and pins `hepmc3 <3.3.1`. An
    # unpinned acts-ship picks up hepmc3 3.3.1 and conflicts with the rest of
    # the SHiP stack. Track conda-forge's hepmc3 until photos/evtgen migrate
    # to 3.3.1, then drop this pin.
    - hepmc3 <3.3.1
    # find_package(TBB REQUIRED) at Examples/Framework/CMakeLists.txt.
    - tbb-devel
    # ACTS_BUILD_EXAMPLES=ON cascades ACTS_BUILD_PLUGIN_ROOT ON, and the
    # SHiP examples module calls root_generate_dictionary.
    - root_base
    - root_cxx_standard
  run:
    # Needed for `import acts` at runtime; ROOT, TBB and Boost come in via the
    # host packages' run_exports.
    - python 3.13.*
    # HepMC3 must be listed explicitly: the capped hepmc3 3.3.0 (see host) has
    # no run_exports.json, unlike 3.3.1, so nothing would otherwise pull it
    # into the runtime/test env and `import acts` fails on libHepMC3.so. Match
    # the host cap. Drop this (and the host pin) once photos/evtgen migrate to
    # hepmc3 3.3.1.
    - hepmc3 <3.3.1
  run_exports:
    - ${{ pin_subpackage('acts-ship', upper_bound='x.x') }}
  ignore_run_exports:
    from_package:
      - hatchling
      - numpy
      - sympy
      - particle

tests:
  - script:
      - test -f $PREFIX/lib/libActsCore.so
      - test -f $PREFIX/lib/libActsPluginRoot.so
      - test -f $PREFIX/lib/libActsExamplesSHiP.so
      - test -f $PREFIX/lib/cmake/Acts/ActsConfig.cmake
      - python -c "import acts"

about:
  homepage: https://github.com/webbjm/acts/tree/shipdist-build
  repository: https://github.com/webbjm/acts
  summary: SHiP fork of ACTS (shipdist-build branch) with SHiP-specific
    examples and Python bindings.
  description: |
    ACTS is an experiment-independent toolkit for charged-particle track
    reconstruction. This recipe packages the SHiP fork at
    webbjm/acts@shipdist-build, which adds SHiP-specific detector
    builders (Straw tracker, MTC, SiT, HGC), a SHiP track writer, an
    initial seeder, and SHiP-side RecoTrack / RecoVertex classes under
    Examples/Algorithms/SHiP/. It also patches the magnetic-field
    interpolator. The vanilla acts-core package on conda-forge does not
    ship any of this.
  license: MPL-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - olantwin
