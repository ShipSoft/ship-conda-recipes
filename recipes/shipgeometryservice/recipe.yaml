context:
  version: "0.1.0"

package:
  name: shipgeometryservice
  version: ${{ version }}

source:
  url: https://github.com/ShipSoft/geometry_service/archive/refs/tags/v${{ version }}.tar.gz
  sha256: b93837a8e9d5515e20078f7eee25d49f03f96091462c85fa2a29cb44126634a0

build:
  number: 1
  skip:
    - win
  script: build.sh

requirements:
  build:
    - ${{ compiler('cxx') }}
    - sysroot_linux-64 2.17.*
    - cmake
    - make
  host:
    - shipgeometry
    - geomodel-core
    - geomodel-g4
    - geant4
    - mp-units
    # GeoModelCoreConfig.cmake does find_dependency(Eigen3); per
    # conda-forge eigen-feedstock README case B, consumers of a
    # library that exposes Eigen in public headers must list
    # eigen-abi-devel in host. Remove once conda-forge
    # geomodel-feedstock ships -devel outputs (case C).
    - eigen-abi-devel
    # GeoModelToolsConfig.cmake does find_dependency(nlohmann_json
    # 3.12.0). conda-forge geomodel-tools keeps nlohmann_json in
    # host only (no run / no run_exports) and nlohmann_json has no
    # run_exports of its own, so any package whose Config triggers
    # find_dependency(GeoModelTools) at configure time forces
    # consumers to list nlohmann_json in host. Remove once
    # conda-forge geomodel-feedstock adds nlohmann_json to
    # geomodel-tools' run:.
    - nlohmann_json
  run_exports:
    - ${{ pin_subpackage('shipgeometryservice', upper_bound='x.x') }}

tests:
  - script:
      - test -f $PREFIX/lib/libSHiPGeometryService.so
      - test -f $PREFIX/lib/cmake/SHiPGeometryService/SHiPGeometryServiceConfig.cmake
      - test -f $PREFIX/include/GeometryService/SHiPGeometryService.h

about:
  homepage: https://github.com/ShipSoft/geometry_service
  repository: https://github.com/ShipSoft/geometry_service
  summary: Framework-agnostic C++20 service wrapping the SHiP GeoModel geometry
  description: |
    SHiPGeometryService is a framework-agnostic C++20 library that
    wraps the SHiP GeoModel geometry behind a stable, abstract
    interface (IGeometryService) inspired by DD4hep's IGeoSvc and
    ALICE O2's GeometryManager. It supports loading the geometry
    either from the SHiPGeometry builder or from a GeoModel SQLite
    file, and lazily converts it to Geant4 logical volumes on demand.
  license: LGPL-3.0-or-later
  license_file: LICENSES/LGPL-3.0-or-later.txt

extra:
  recipe-maintainers:
    - olantwin
