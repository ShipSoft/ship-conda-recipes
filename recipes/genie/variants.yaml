# Hadronization/decay backend variants. pythia8 is the default (gated by
# --enable-pythia8, genie::Pythia8Decayer2023 -- matches the FairShip/cvmfs
# build and its shipgen/genie_config); pythia6 (matches upstream defaults and
# the G18 tunes) is still built but down-prioritized in recipe.yaml so a bare
# `genie` dependency resolves to pythia8.
genie_hadronization:
  - pythia6
  - pythia8

# ROOT C++-standard variant; root_base is pinned deliberately — see
# "ROOT C++ standard variants" in the README. GENIE's perl configure sets no
# explicit C++ standard (it inherits ROOT's via root-config), so there is no
# compile flag to drive here — this only makes the ROOT build it links
# against deterministic.
root_cxx_standard:
  - "20"
  - "23"
root_base:
  - "6.40.2"
