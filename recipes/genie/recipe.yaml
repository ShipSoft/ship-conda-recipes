context:
  version: "3.06.02"

package:
  name: genie
  version: ${{ version }}

source:
  url: https://github.com/GENIE-MC/Generator/archive/refs/tags/R-${{ version | replace(".", "_") }}.tar.gz
  sha256: 5770346d888bbac7a80872e7aa01953437ab867e335e39cc7412c9b83a0b4e2a

build:
  number: 3
  # Make the hadronization backend visible in the build string
  # (e.g. genie-3.06.02-pythia8_h1234567_0).
  string: ${{ genie_hadronization }}_${{ hash }}_${{ build_number }}
  # pythia8 is the default variant the solver picks for a bare `genie`
  # dependency: down-prioritize pythia6. FairShip's shipgen/genie_config
  # mandates genie::Pythia8Decayer2023, which needs GENIE built with
  # --enable-pythia8 (as the cvmfs/alienv build is: GOPT_ENABLE_PYTHIA8=YES);
  # the pure-pythia6 variant FATALs there ("calling GENIE/PYTHIA8 decay
  # without enabling PYTHIA8"). Down-prioritizing is implemented via
  # track_features, so only the magnitude matters -- 1 is enough to break the
  # tie in favour of pythia8.
  variant:
    down_prioritize_variant: ${{ 1 if genie_hadronization == "pythia6" else 0 }}
  script:
    file: build.sh
    env:
      GENIE_HADRONIZATION: ${{ genie_hadronization }}

requirements:
  build:
    - ${{ compiler('cxx') }}
    - sysroot_linux-64 2.17.*
    - make
    # GENIE's configure is a hand-rolled perl script, not autoconf.
    - perl
  host:
    # ROOT series and C++ standard are driven by the root_base /
    # root_cxx_standard variant keys (see variants.yaml). genie builds a
    # cxx20 variant (for FairShip and the default ROOT stack) and a cxx23
    # variant (for phlex/aegir).
    - root_base
    - root_cxx_standard
    - if: genie_hadronization == "pythia6"
      then:
        # TPythia6 interface: conda-forge ROOT is built without pythia6,
        # so the standalone rootegpythia6 package provides libEGPythia6 +
        # headers.
        - rootegpythia6
        - pythia6
      else:
        - pythia8
    - lhapdf
    - log4cpp
    - libxml2
    - gsl
  run:
    # Runtime data tables ($GENIE/data), split out because they dominate
    # the package size and are identical for all build variants.
    - genie-data ==${{ version }}
    # conda-forge's log4cpp package is missing its libnsl run dependency
    # (liblog4cpp.so.5 has DT_NEEDED libnsl.so.3 but the package only
    # depends on libgcc/libstdcxx); pull it in ourselves until that is
    # fixed upstream.
    - libnsl
  run_exports:
    - ${{ pin_subpackage('genie', upper_bound='x.x') }}

tests:
  - script:
      - test -f $PREFIX/bin/gevgen
      - test -f $PREFIX/bin/gevgen_fnal
      - test -f $PREFIX/bin/gevgen_atmo
      - test -f $PREFIX/bin/gmkspl
      - test -f $PREFIX/bin/gntpc
      - test -f $PREFIX/lib/libGFwEG-${{ version }}.so
      - test -f $PREFIX/lib/libGTlFlx-${{ version }}.so
      - test -d $PREFIX/include/GENIE/Framework
      - test -d $PREFIX/share/genie/config
      # Provided by the genie-data run dependency, into the same
      # $GENIE=share/genie tree.
      - test -d $PREFIX/share/genie/data
      # genie-config needs $GENIE, exported by the activation script
      - genie-config --version
      - genie-config --libs
      # Loads all GENIE libraries and the full tune/config XML chain from
      # $GENIE/config, so it smoke-tests the runtime setup end to end.
      # The G18 tunes hardwire Pythia6 algorithms (Pythia6Decayer2023 in
      # AGKYLowW2019/UnstableParticleDecayer), so this only works on the
      # pythia6 variant.
      - if: genie_hadronization == "pythia6"
        then: gconfigdump --tune G18_02a_02_11b

about:
  homepage: http://www.genie-mc.org
  repository: https://github.com/GENIE-MC/Generator
  summary: GENIE neutrino Monte Carlo event generator
  description: |
    GENIE (Generates Events for Neutrino Interaction Experiments) is a
    neutrino Monte Carlo event generator simulating neutrino
    interactions over all energy scales relevant to accelerator and
    atmospheric neutrino experiments. This build enables LHAPDF6, the
    built-in flux and geometry drivers, and the FNAL-experiment and
    atmospheric event generation apps. Two hadronization/decay variants
    are built: pythia8 (default; --enable-pythia8, genie::Pythia8Decayer2023,
    matching the FairShip/cvmfs build) and pythia6 (TPythia6 via the
    standalone rootegpythia6 package, kept for the G18 tunes that hardwire
    Pythia6 algorithms). The solver prefers pythia8 for a bare `genie`
    dependency; request pythia6 explicitly (build "pythia6_*") if needed.
  # Upstream ships no LICENSE file; the GENIE copyright page states the
  # code is (partially) GPLv3, so GPL-3.0-or-later is our best estimate.
  license: GPL-3.0-or-later

extra:
  recipe-maintainers:
    - olantwin
