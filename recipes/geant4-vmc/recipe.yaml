context:
  version: "6-8"

package:
  name: geant4-vmc
  version: ${{ version | replace("-", ".") }}

source:
  url: https://github.com/vmc-project/geant4_vmc/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 5fc038ef63739bd7a7bf63e43589af020e37dc2154512619d11a6bed31fbe7b8

build:
  number: 4
  script: build.sh

requirements:
  build:
    - ${{ compiler('cxx') }}
    - sysroot_linux-64 2.17.*
    - cmake
    - make
  host:
    - root_base 6.40.*
    - root_cxx_standard
    - vmc
    - geant4 11.4.*
    - vgm
    - xerces-c
  run_exports:
    - ${{ pin_subpackage('geant4-vmc', upper_bound='x.x') }}

tests:
  - script:
      - test -f $PREFIX/lib/libgeant4vmc.so
      - test -f $PREFIX/lib/libg4root.so
      - test -d $PREFIX/include/geant4vmc

about:
  homepage: https://vmc-project.github.io
  repository: https://github.com/vmc-project/geant4_vmc
  summary: Virtual Monte Carlo interface implementation for Geant4
  description: |
    Geant4 VMC implements the Virtual Monte Carlo (VMC) interface for
    the Geant4 simulation toolkit, allowing VMC-based simulation
    applications to use Geant4 as their transport engine. The package
    also includes the G4Root module (Geant4 navigation through ROOT
    TGeo geometries) and a set of VMC example applications.
  license: GPL-3.0-or-later
  license_file: LICENSE

extra:
  recipe-maintainers:
    - olantwin
