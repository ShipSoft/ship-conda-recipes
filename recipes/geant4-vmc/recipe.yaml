context:
  version: "6.8"
  tag: "v6-8"

package:
  name: geant4-vmc
  version: ${{ version }}

source:
  url: https://github.com/vmc-project/geant4_vmc/archive/refs/tags/${{ tag }}.tar.gz
  sha256: 5fc038ef63739bd7a7bf63e43589af020e37dc2154512619d11a6bed31fbe7b8

build:
  number: 0
  script: build.sh

requirements:
  build:
    - ${{ compiler('cxx') }}
    - cmake
    - make
  host:
    - root 6.40.*
    - vmc
    - geant4 11.4.*
    - vgm
    - xerces-c
  run:
    - root 6.40.*
    - vmc
    - geant4 11.4.*
    - vgm
    - xerces-c
  run_exports:
    - root 6.40.*
    - geant4 11.4.*

tests:
  - script:
      - test -f $PREFIX/lib/libgeant4vmc.so
      - test -f $PREFIX/lib/libg4root.so
      - test -d $PREFIX/include/geant4vmc
