package:
  name: geant4-vmc
  version: "6.7.1"

source:
  git: https://github.com/vmc-project/geant4_vmc
  tag: v6-7-p1

build:
  script: build.sh

requirements:
  build:
    - ${{ compiler('cxx') }}
    - cmake
    - make
  host:
    - root
    - vmc
    - geant4
    - vgm
    - xerces-c
  run:
    - root
    - vmc
    - geant4
    - vgm
    - xerces-c

tests:
  - script:
      - test -f $PREFIX/lib/libgeant4vmc.so
      - test -f $PREFIX/lib/libg4root.so
      - test -d $PREFIX/include/geant4vmc
