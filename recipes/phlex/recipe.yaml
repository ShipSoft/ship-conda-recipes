context:
  version: "0.2.0"

package:
  name: phlex
  version: ${{ version }}

source:
  url: https://github.com/Framework-R-D/phlex/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 37833e1b976ec534d8da5b9ec412f297426e2e534ae8e471124f6a1859fe9841

build:
  number: 6
  skip:
    - win
  script: build.sh
  dynamic_linking:
    missing_dso_allowlist:
      - lib/libpython*
      - lib/libCore*
      - lib/libRIO*
      - lib/libTree*

requirements:
  build:
    - ${{ compiler('cxx') }}
    - sysroot_linux-64 2.17.*
    - cmake
    - make
  host:
    - cetmodules
    - libboost-devel >=1.90,<1.91
    - fmt
    - tbb-devel
    - spdlog
    - libjsonnet
    - root
  run:
    - libboost-devel >=1.90,<1.91
    - fmt
    - tbb
    - spdlog
    - libjsonnet
    - root

tests:
  - package_contents:
      lib:
        - phlex_core

about:
  homepage: https://github.com/Framework-R-D/phlex
  repository: https://github.com/Framework-R-D/phlex
  summary: Parallel, Hierarchical, and Layered Execution of data-processing algorithms
  description: |
    Phlex is a framework for the Parallel, Hierarchical, and Layered
    Execution of data-processing algorithms. It lets users implement
    algorithms and organise them into multi-threaded workflows
    structured around hierarchical event/data tiers, building on
    Intel TBB for task parallelism and on the patterns established by
    Fermilab's art framework.
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - olantwin
