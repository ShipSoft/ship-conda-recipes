context:
  version: "0.2.0"

package:
  name: aegir
  version: ${{ version }}

source:
  url: https://github.com/ShipSoft/aegir/archive/refs/tags/v${{ version }}.tar.gz
  sha256: d19f2731a0d0c45167397a30068b3291cff388be47ac9c55afdd6713bfb2bf1d

build:
  number: 2
  skip:
    - win
  script: build.sh

requirements:
  build:
    - ${{ compiler('cxx') }}
    - sysroot_linux-64 2.17.*
    - cmake
    - make
  host:
    # Pin <1 to exclude the legacy 26.06.0 builds still on the ship
    # channel; without this, conda's resolver maximises version at
    # build time and picks 26.06.0, baking the wrong run_export pin
    # into aegir.
    - shipdatamodel <1
    - phlex
    - shipgeometryservice <1
    - field-service-core
    - field-service-g4
    - root_base
    - root_cxx_standard
    - geant4
    - pythia8
    - random123
    - libboost-devel
    - tbb-devel
    - spdlog
    - fmt
    - mp-units
    - ms-gsl
  run:
    # Header-only libraries with no run_exports.
    - ms-gsl
    - random123

tests:
  - script:
      - test -f $PREFIX/lib/libparticle_gun_source.so
      - test -f $PREFIX/lib/libpythia8_source.so
      - test -f $PREFIX/lib/libfixed_target_source.so
      - test -f $PREFIX/lib/libgeometry_builtin_provider.so
      - test -f $PREFIX/lib/libgeometry_gdml_provider.so
      - test -f $PREFIX/lib/libgeometry_geomodel_provider.so
      - test -f $PREFIX/lib/libfield_covfie_provider.so
      - test -f $PREFIX/lib/libfield_null_provider.so
      - test -f $PREFIX/lib/libgeant4_module.so
      - test -f $PREFIX/lib/libsim_output_module.so
      - test -f $PREFIX/bin/pythia8_benchmark
      - test -d $PREFIX/share/aegir/workflows

about:
  homepage: https://github.com/ShipSoft/aegir
  repository: https://github.com/ShipSoft/aegir
  summary: Phlex-based simulation framework for the SHiP experiment
  description: |
    aegir is the next-generation simulation framework for the SHiP
    experiment, built on top of the Phlex parallel data-processing
    toolkit and the SHiP event data model. It composes pluggable
    sources (particle gun, Pythia8, fixed-target), geometry providers
    (built-in, GDML, GeoModel via SHiPGeometryService), a Geant4
    transform module, and an RNTuple-based output observer into a
    multi-threaded simulation workflow.
  license: LGPL-3.0-or-later
  license_file: LICENSES/LGPL-3.0-or-later.txt

extra:
  recipe-maintainers:
    - olantwin
