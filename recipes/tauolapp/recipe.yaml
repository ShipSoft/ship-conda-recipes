package:
  name: tauolapp
  version: "1.1.8"

source:
  git: https://gitlab.cern.ch/tauolapp/tauolapp
  tag: v1.1.8

build:
  script: build.sh

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ compiler('fortran') }}
    - autoconf
    - automake
    - libtool
    - make
  host:
    - hepmc3
    - root
    - pythia8
  run:
    - hepmc3
    - root
    - pythia8

test:
  commands:
    - test -f $PREFIX/lib/libTauolaCxxInterface.so
    - test -f $PREFIX/lib/libTauolaFortran.so
    - test -f $PREFIX/lib/libTauolaHepMC3.so
