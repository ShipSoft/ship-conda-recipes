package:
  name: rootegpythia6
  version: "0.1"

source:
  url: https://github.com/luketpickering/ROOTEGPythia6/archive/feb7c7eb8d368aee20bf1cb01f1bbfb9cfaeb6b5.tar.gz

build:
  script: build.sh

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ compiler('fortran') }}
    - cmake
    - make
  host:
    - root
  run:
    - root

tests:
  - script:
      - test -f $PREFIX/lib/libEGPythia6.so
