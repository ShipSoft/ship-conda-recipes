package:
  name: rootegpythia6
  version: "0.1"

source:
  url: https://github.com/luketpickering/ROOTEGPythia6/archive/feb7c7eb8d368aee20bf1cb01f1bbfb9cfaeb6b5.tar.gz
  sha256: 891d637fe278c9f77eca14d66eaeb7d49af6d2bdef73af637fcc41783b096832
  patches:
    - fix-dictionary-paths.patch
    - fix-pythia6-private-link.patch

build:
  number: 5
  script: build.sh

requirements:
  build:
    - ${{ compiler('cxx') }}
    - sysroot_linux-64 2.17.*
    - cmake
    - make
  host:
    - root_base 6.40.*
    - root_cxx_standard
    - pythia6
  run:
    - root_base 6.40.*
    - root_cxx_standard
    - pythia6
  run_exports:
    - root_base 6.40.*
    - root_cxx_standard

tests:
  - script:
      - test -f $PREFIX/lib/libEGPythia6.so

about:
  homepage: https://github.com/luketpickering/ROOTEGPythia6
  repository: https://github.com/luketpickering/ROOTEGPythia6
  summary: Standalone ROOT EGPythia6 library (extracted from ROOT 6.28)
  description: |
    ROOTEGPythia6 packages the EGPythia6 library — ROOT's TGenerator
    interface to the Pythia6 event generator — as a standalone CMake
    project. The code was extracted from the ROOT 6.28 source tree
    after EGPythia6 was removed from ROOT itself in v6.30, allowing
    downstream experiments to keep using Pythia6 through the familiar
    TPythia6 interface.
  license: GPL-3.0-or-later
  license_file: LICENSE

extra:
  recipe-maintainers:
    - olantwin
