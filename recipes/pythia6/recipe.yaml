package:
  name: pythia6
  version: "6.4.28"

source:
  git: https://github.com/SND-LHC/pythia6
  tag: v6.4.28-snd

build:
  script: build.sh

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ compiler('fortran') }}
    - cmake
    - make

test:
  commands:
    - test -f $PREFIX/lib/libpythia6.so
    - test -f $PREFIX/lib/libPythia6.so
