package:
  name: pythia6
  version: "6.4.28"

source:
  url: https://github.com/SND-LHC/pythia6/archive/refs/tags/v6.4.28-snd.tar.gz
  sha256: d5558cd419c8d46bdc958064cb97f963d1ea793866414c025906ec15033512ed
  patches:
    - restore-dummy-pdflib.patch

build:
  number: 4
  script: build.sh

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ compiler('fortran') }}
    - sysroot_linux-64 2.17.*
    - cmake
    - make

tests:
  - script:
      - test -f $PREFIX/lib/libpythia6.so
      - test -f $PREFIX/lib/libPythia6.so
