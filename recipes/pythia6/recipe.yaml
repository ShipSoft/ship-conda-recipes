package:
  name: pythia6
  version: "6.4.28"

source:
  url: https://github.com/SND-LHC/pythia6/archive/refs/heads/v6.4.28-snd.tar.gz

build:
  script: build.sh

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ compiler('fortran') }}
    - cmake
    - make

tests:
  - script:
      - test -f $PREFIX/lib/libpythia6.so
      - test -f $PREFIX/lib/libPythia6.so
