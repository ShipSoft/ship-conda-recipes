package:
  name: pythia6
  version: "6.4.28"

source:
  url: https://github.com/SND-LHC/pythia6/archive/a918d08839df79965787e1fbf43ea16acc1e443d.tar.gz
  sha256: 3806efdb4fd1e295082f193bd0d03800d3fa904525cb82b0a9540401701711fa
  patches:
    - restore-dummy-pdflib.patch

build:
  number: 5
  script: build.sh

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ compiler('fortran') }}
    - sysroot_linux-64 2.17.*
    - cmake
    - make
  run_exports:
    - ${{ pin_subpackage('pythia6', upper_bound='x.x') }}

tests:
  - script:
      - test -f $PREFIX/lib/libpythia6.so
      - test -f $PREFIX/lib/libPythia6.so

about:
  homepage: https://pythia.org/pythia6/
  repository: https://github.com/SND-LHC/pythia6
  summary: Pythia6 event generator sources (SND@LHC distribution)
  description: |
    Pythia6 is the legacy Fortran version of the Pythia high-energy
    physics event generator, providing parton showers, multi-parton
    interactions and hadronisation for hadronic collisions. This
    repository is the SND@LHC distribution of the sources (originally
    repackaged for ALICE) used for building Pythia6 as a shared
    library against ROOT.
  # Upstream tarball ships no LICENSE; GPL-2.0 is the historical
  # Pythia 6.4 license per the physics manual (arXiv:hep-ph/0603175).
  license: GPL-2.0-or-later

extra:
  recipe-maintainers:
    - olantwin
