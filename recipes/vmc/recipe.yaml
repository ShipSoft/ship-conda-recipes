context:
  version: "2.2"
  tag: "v2-2"

package:
  name: vmc
  version: ${{ version }}

source:
  url: https://github.com/vmc-project/vmc/archive/refs/tags/${{ tag }}.tar.gz
  sha256: 6da6a32352c5a3eb62d07aed92414a0baf2793f6ec0630402e3df7fcb1b73d7b

build:
  number: 2
  script: build.sh

requirements:
  build:
    - ${{ compiler('cxx') }}
    - sysroot_linux-64 2.17.*
    - cmake
    - make
  host:
    - root 6.40.*
  run:
    - root 6.40.*
  run_exports:
    - root 6.40.*

tests:
  - script:
      - test -f $PREFIX/lib/libVMCLibrary.so
      - test -d $PREFIX/include/vmc

about:
  homepage: https://vmc-project.github.io
  repository: https://github.com/vmc-project/vmc
  summary: The Virtual Monte Carlo core library
  description: |
    The Virtual Monte Carlo (VMC) core library defines a detector
    simulation framework that allows applications to switch between
    different Monte Carlo transport codes (Geant3, Geant4, FLUKA)
    without changing the user code, input/output format or geometry
    definition. This package provides the transport-engine-independent
    interfaces and base classes against which concrete VMC backends
    (geant3, geant4-vmc, ...) are implemented.
  license: GPL-3.0-or-later
  license_file: LICENSE

extra:
  recipe-maintainers:
    - olantwin
