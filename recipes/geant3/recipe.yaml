package:
  name: geant3
  version: "4.5"

source:
  url: https://github.com/vmc-project/geant3/archive/refs/tags/v4-5.tar.gz
  sha256: 0fbfe4a9e50b3bc8af7efc11d2b167c341ba0ec3103ddbdf6d88736fd1f26e23

build:
  number: 4
  script: build.sh

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ compiler('fortran') }}
    - sysroot_linux-64 2.17.*
    - cmake
    - make
  host:
    - root_base 6.40.*
    - root_cxx_standard
    - vmc
  run_exports:
    - ${{ pin_subpackage('geant3', upper_bound='x.x') }}

tests:
  - script:
      - test -f $PREFIX/lib/libgeant321.so || test -f $PREFIX/lib64/libgeant321.so

about:
  homepage: https://vmc-project.github.io
  repository: https://github.com/vmc-project/geant3
  summary: Geant3.21 with the TGeant3 Virtual Monte Carlo interface
  description: |
    This package bundles the classic Geant3.21 Monte Carlo transport
    code together with TGeant3, the implementation of the Virtual
    Monte Carlo (VMC) interface for Geant3.21. VMC allows simulation
    applications to switch between different Monte Carlo transport
    engines (Geant3, Geant4, FLUKA) without changing the user code,
    input/output format or geometry definition.
  license: GPL-3.0-or-later

extra:
  recipe-maintainers:
    - olantwin
