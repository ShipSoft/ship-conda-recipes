context:
  version: "0.2.0"

package:
  name: shipgeometry
  version: ${{ version }}

source:
  url: https://github.com/ShipSoft/Geometry/archive/refs/tags/v${{ version }}.tar.gz
  sha256: ec3d50390369abb151de03fd7c5d8e5d944242ea0e05f8a35f95cdb8a60ab459

build:
  number: 0
  skip:
    - win
  script: build.sh

requirements:
  build:
    - ${{ compiler('cxx') }}
    - sysroot_linux-64 2.17.*
    - cmake
    - make
  host:
    - geomodel-core
    - geomodel-tools
    - sqlite
    - tomlplusplus
  run_exports:
    - ${{ pin_subpackage('shipgeometry', upper_bound='x.x') }}

tests:
  - script:
      - test -f $PREFIX/lib/libSHiPGeometry.so
      - test -f $PREFIX/lib/libCavern.so
      - test -f $PREFIX/lib/libTarget.so
      - test -f $PREFIX/lib/libMuonShield.so
      - test -f $PREFIX/lib/libMagnet.so
      - test -f $PREFIX/lib/libDecayVolume.so
      - test -f $PREFIX/lib/libTrackers.so
      - test -f $PREFIX/lib/libCalorimeter.so
      - test -f $PREFIX/lib/libUpstreamTagger.so
      - test -f $PREFIX/lib/libTimingDetector.so
      - test -f $PREFIX/lib/libNeutrinoDetector.so
      - test -f $PREFIX/bin/build_geometry
      - test -f $PREFIX/bin/validate_geometry
      - test -f $PREFIX/lib/cmake/SHiPGeometry/SHiPGeometryConfig.cmake

about:
  homepage: https://github.com/ShipSoft/Geometry
  repository: https://github.com/ShipSoft/Geometry
  summary: SHiP detector description implemented in GeoModel
  description: |
    This package contains the SHiP experiment detector geometry
    implemented using the GeoModel toolkit. It provides the cavern,
    target, muon shield, magnet, decay volume, trackers, calorimeter,
    upstream tagger and timing detector subsystems as a set of
    libraries plus executables to build and validate the resulting
    GeoModel geometry database.
  license: LGPL-3.0-or-later
  license_file: LICENSES/LGPL-3.0-or-later.txt

extra:
  recipe-maintainers:
    - olantwin
