context:
  version: "1.14.0"

package:
  name: random123
  version: ${{ version }}

source:
  url: https://github.com/DEShawResearch/random123/archive/refs/tags/v${{ version }}.tar.gz
  sha256: effafd8656b18030b2a5b995cd3650c51a7c45052e6e1c21e48b9fa7a59d926e

build:
  number: 1
  noarch: generic
  skip:
    - win
  script: build.sh

tests:
  - script:
      - test -f $PREFIX/include/Random123/philox.h
      - test -f $PREFIX/include/Random123/threefry.h

about:
  homepage: https://www.deshawresearch.com/resources_random123.html
  repository: https://github.com/DEShawResearch/random123
  summary: Counter-based random number generators for C, C++ and CUDA
  description: |
    Random123 is a collection of fast, high-quality, counter-based
    pseudo-random number generators (Threefry, Philox, ARS and AES)
    designed for statistical applications and Monte Carlo simulation
    on CPUs and GPUs. The generators pass the SmallCrush, Crush and
    BigCrush TestU01 batteries and are well suited to massively
    parallel workloads, but are explicitly not intended for
    cryptographic use.
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - olantwin
