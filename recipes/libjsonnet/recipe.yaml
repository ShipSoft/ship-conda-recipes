context:
  version: "0.22.0"

package:
  # Named `libjsonnet` (not `jsonnet`) to disambiguate from conda-forge's
  # `jsonnet`, which packages only the Python bindings.
  name: libjsonnet
  version: ${{ version }}

source:
  url: https://github.com/google/jsonnet/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 5914b9904d97efa662d919519cef1a14e4132bfddddaeed8b061b4a8af628f8d

build:
  number: 1
  skip:
    - win
  script: build.sh

requirements:
  build:
    - ${{ compiler('cxx') }}
    - sysroot_linux-64 2.17.*
    - cmake
    - make
  host:
    - nlohmann_json

tests:
  - package_contents:
      bin:
        - jsonnet
      lib:
        - jsonnet
        - jsonnet++
      include:
        - libjsonnet.h
        - libjsonnet++.h
