context:
  version: "0.22.0"

package:
  # Named `libjsonnet` (not `jsonnet`) to disambiguate from conda-forge's
  # `jsonnet`, which packages only the Python bindings.
  name: libjsonnet
  version: ${{ version }}

source:
  url: https://github.com/google/jsonnet/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 5914b9904d97efa662d919519cef1a14e4132bfddddaeed8b061b4a8af628f8d

build:
  number: 1
  skip:
    - win
  script: build.sh

requirements:
  build:
    - ${{ compiler('cxx') }}
    - sysroot_linux-64 2.17.*
    - cmake
    - make
  host:
    - nlohmann_json

tests:
  - package_contents:
      bin:
        - jsonnet
      lib:
        - jsonnet
        - jsonnet++
      include:
        - libjsonnet.h
        - libjsonnet++.h

about:
  homepage: https://jsonnet.org
  repository: https://github.com/google/jsonnet
  summary: The data templating language
  description: |
    Jsonnet is a data templating language designed for application
    and configuration management. It extends JSON with variables,
    functions, conditionals, arithmetic, and object-oriented features
    while guaranteeing hermetic, side-effect-free evaluation; programs
    compile down to plain JSON, YAML or other structured formats.
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - olantwin
