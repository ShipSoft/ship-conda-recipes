context:
  version: "6.27.0"

package:
  name: geomodel
  version: ${{ version }}

source:
  url: https://gitlab.cern.ch/GeoModelDev/GeoModel/-/archive/${{ version }}/GeoModel-${{ version }}.tar.gz
  sha256: 018c5087b70d956793d06dc040f842018eb3bedd9b2f175c6090af63ce963408

build:
  number: 6
  skip:
    - win
  script: build.sh
  dynamic_linking:
    missing_dso_allowlist:
      - lib/libCLHEP*
      - lib/libz.so*
      - lib/libhdf5*

requirements:
  build:
    - ${{ compiler('cxx') }}
    - sysroot_linux-64 2.17.*
    - cmake
    - make
  host:
    - sqlite
    - xerces-c
    - nlohmann_json
    - eigen
    - geant4 11.4.*
  run:
    - sqlite
    - xerces-c
    - nlohmann_json
    - eigen
    - geant4 11.4.*
  run_exports:
    - geant4 11.4.*

tests:
  - package_contents:
      lib:
        - GeoModelKernel

about:
  homepage: https://geomodel.web.cern.ch/
  repository: https://gitlab.cern.ch/GeoModelDev/GeoModel
  summary: GeoModel libraries and tools for detector geometry description
  description: |
    GeoModel is a lightweight, framework-agnostic C++ toolkit for
    describing detector geometries originally developed for the ATLAS
    experiment. It provides the core geometry kernel, I/O utilities
    (SQLite, GDML), conversion tools to Geant4 and a visualization
    stack, and is used by multiple HEP experiments to share a common
    geometry representation.
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - olantwin
