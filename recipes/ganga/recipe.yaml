context:
  version: "8.7.12"

package:
  name: ganga
  version: ${{ version }}

source:
  url: https://github.com/ganga-devs/ganga/archive/refs/tags/${{ version }}.tar.gz
  sha256: 9a5966b3eff859b5f9716f7af5f51d3da7c2574c67e99268921dc5fdcf142a53

build:
  number: 1
  skip:
    - win
    - osx
  noarch: python
  script: python -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools
  run:
    - python >=3.9
    - ipython >=5.0.0
    - aiofile >=3.7.4
    - aiohttp >=3.8.4
    - absl-py >=0.1.2
    - google-api-python-client
    - google-auth-httplib2
    - google-auth-oauthlib
    - requests >=2.23.0
    - docker-py
    - pymongo
    - gdown
    - htcondor

tests:
  - python:
      imports:
        - ganga

about:
  homepage: https://github.com/ganga-devs/ganga
  repository: https://github.com/ganga-devs/ganga
  documentation: https://ganga.readthedocs.io/
  summary: Easy-to-use frontend for job definition and management
  description: |
    Ganga is a tool to compose, run and track computing jobs across a
    variety of backends and application types. It provides a
    user-friendly command-line and interactive IPython interface that
    abstracts batch systems, the grid and cloud back-ends behind a
    uniform Python API, and is widely used in high-energy physics for
    distributed analysis and production workflows.
  license: GPL-3.0-or-later
  license_file: LICENSE_GPL

extra:
  recipe-maintainers:
    - olantwin
