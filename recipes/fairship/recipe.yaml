context:
  version: "26.05.7"

package:
  name: fairship
  version: ${{ version }}

source:
  url: https://github.com/ShipSoft/FairShip/archive/ab839844699bf204cf6916819d8f4b929e28c8d2.tar.gz
  sha256: 70659bb8b25078e696165c8a54f317dcbc009a2ef5bde267c5cc8512eefcca6d

build:
  number: 2
  script: build.sh

requirements:
  build:
    - ${{ compiler('cxx') }}
    - cmake
    - make
  host:
    - root
    - geant4 11.4.*
    - geant4-vmc
    - geant3
    - vmc
    - fairroot
    - faircmakemodules
    - fairlogger
    - genfit
    - rootegpythia6
    - pythia6
    - pythia8
    - evtgen
    - hepmc2
    - fmt
    - gsl
    - xerces-c
  run:
    - root
    - geant4 11.4.*
    - geant4-vmc
    - geant3
    - vmc
    - fairroot
    - fairlogger
    - genfit
    - rootegpythia6
    - pythia6
    - pythia8
    - evtgen
    - hepmc2
    - fmt
    - gsl
    - xerces-c

tests:
  - script:
      - test -f $PREFIX/lib/libShipData.so
      - test -d $PREFIX/include
      - test -d $PREFIX/share/FairShip/geometry
