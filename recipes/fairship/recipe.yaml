context:
  version: "26.05.7"

package:
  name: fairship
  version: ${{ version }}

source:
  url: https://github.com/ShipSoft/FairShip/archive/ab839844699bf204cf6916819d8f4b929e28c8d2.tar.gz
  sha256: 70659bb8b25078e696165c8a54f317dcbc009a2ef5bde267c5cc8512eefcca6d

build:
  number: 4
  script: build.sh

requirements:
  build:
    - ${{ compiler('cxx') }}
    - sysroot_linux-64 2.17.*
    - cmake
    - make
  host:
    - root_base
    - root_cxx_standard
    - geant4 11.4.*
    - geant4-vmc
    - geant3
    - vmc
    - fairroot
    - faircmakemodules
    - fairlogger
    - genfit
    - rootegpythia6
    - pythia6
    - pythia8
    - evtgen
    - hepmc2
    - fmt
    - gsl
    - xerces-c

tests:
  - script:
      - test -f $PREFIX/lib/libShipData.so
      - test -d $PREFIX/include
      - test -d $PREFIX/share/FairShip/geometry

about:
  homepage: https://ship.web.cern.ch/
  repository: https://github.com/ShipSoft/FairShip
  summary: SHiP experiment software framework based on FairRoot
  description: |
    FairShip is the simulation, reconstruction and analysis framework
    for the SHiP (Search for Hidden Particles) experiment at CERN. It
    is built on top of FairRoot and provides the SHiP detector
    description, event generators, digitisation, reconstruction and
    analysis tools used by the collaboration.
  license: LGPL-3.0-or-later
  license_file: LICENSE

extra:
  recipe-maintainers:
    - olantwin
