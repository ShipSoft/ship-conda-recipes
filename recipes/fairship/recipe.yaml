context:
  version: "26.06"

package:
  name: fairship
  version: ${{ version }}

source:
  url: https://github.com/ShipSoft/FairShip/archive/refs/tags/${{ version }}.tar.gz
  sha256: 2f4469ae667b8ddce63e1fee4080ea9f35765789e1c006b07a4653ff5a1a443a

build:
  number: 0
  script: build.sh

requirements:
  build:
    - ${{ compiler('cxx') }}
    - sysroot_linux-64 2.17.*
    - cmake
    - make
  host:
    - root_base
    - root_cxx_standard
    - geant4
    - geant4-vmc
    - geant3
    - vmc
    - fairroot
    - faircmakemodules
    - fairlogger
    - genfit
    - rootegpythia6
    - pythia6
    - pythia8
    - evtgen
    - hepmc2
    - fmt
    - gsl
    - xerces-c
  run_exports:
    - ${{ pin_subpackage('fairship', upper_bound='x.x') }}

tests:
  - script:
      - test -f $PREFIX/lib/libShipData.so
      - test -d $PREFIX/include
      - test -d $PREFIX/share/FairShip/geometry

about:
  homepage: https://ship.web.cern.ch/
  repository: https://github.com/ShipSoft/FairShip
  summary: SHiP experiment software framework based on FairRoot
  description: |
    FairShip is the simulation, reconstruction and analysis framework
    for the SHiP (Search for Hidden Particles) experiment at CERN. It
    is built on top of FairRoot and provides the SHiP detector
    description, event generators, digitisation, reconstruction and
    analysis tools used by the collaboration.
  license: LGPL-3.0-or-later
  license_file: LICENSE

extra:
  recipe-maintainers:
    - olantwin
