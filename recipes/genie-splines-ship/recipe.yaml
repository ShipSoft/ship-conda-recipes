context:
  # Version tracks the genie package the splines were generated with;
  # bump the workflow build-number input for spline-config changes.
  version: "3.06.02"
  tune: G18_02a_02_11b
  # ------------------------------------------------------------------
  # Two build paths:
  #
  # production — .github/workflows/splines.yml generates the full
  #   spline set on CI runners (all flavours x SHiP nuclides, merged
  #   with gspladd) and injects the merged XML via the env vars below;
  #   the provenance file (<xml>.provenance) is installed alongside.
  #
  # smoke (default, local / PR CI) — build.sh runs gmkspl with the
  #   reduced configuration below: one flavour pair, one nucleus, few
  #   knots, low max energy, and only the CCDIS process. Finishes in
  #   minutes yet exercises the runtime stack (tune loading, GRV98lo
  #   grid from $GENIE/data, DIS cross sections, XML output).
  #
  #   NB: the resonance cache gmkspl builds for the full process list
  #   is energy-range independent and takes ~30-45 min per interaction
  #   channel regardless of -n/-e; restricting to CCDIS is what keeps
  #   the smoke build fast, not the knot count or the max energy.
  # ------------------------------------------------------------------
  prebuilt_xml: ${{ env.get("GENIE_SPLINES_PREBUILT", default="") }}
  spline_source: ${{ "production" if prebuilt_xml else "smoke" }}
  spline_pdgs: "14,-14"
  spline_targets: "1000260560"
  spline_knots: "10"
  spline_emax: "10"
  spline_gen_list: "CCDIS"

package:
  name: genie-splines-ship
  version: ${{ version }}

build:
  # Smoke builds use number 1; the production workflow injects a number
  # >= 100 (its build-number input) so production packages always win
  # solver tie-breaks over smoke builds of the same version.
  number: ${{ env.get("GENIE_SPLINES_BUILD_NUMBER", default="1") | int }}
  # Make the spline source visible in the build string.
  string: ${{ spline_source }}_${{ hash }}_${{ build_number }}
  noarch: generic
  script:
    file: build.sh
    env:
      GENIE_SPLINES_PREBUILT: ${{ prebuilt_xml }}
      GENIE_TUNE: ${{ tune }}
      SPLINE_PDGS: ${{ spline_pdgs }}
      SPLINE_TARGETS: ${{ spline_targets }}
      SPLINE_KNOTS: ${{ spline_knots }}
      SPLINE_EMAX: ${{ spline_emax }}
      SPLINE_GEN_LIST: ${{ spline_gen_list }}

requirements:
  build:
    # gmkspl runs on the build machine (smoke path only; the production
    # workflow generates its XML with the same published genie
    # package). Pin the pythia6 variant: the G18 tunes hardwire Pythia6
    # algorithms. Pulls in genie-data (run dep of genie), which
    # provides the GRV98lo_patched PDF grid the default tune reads from
    # $GENIE/data — no LHAPDF set download is needed (LHAPDF6 upstream
    # ships no GRV98lo; GENIE bundles its own copy).
    - genie ==${{ version }} pythia6_*

tests:
  - script:
      - test -f $PREFIX/share/genie-splines-ship/gxspl-ship.xml
      - grep -q "<genie_xsec_spline_list" $PREFIX/share/genie-splines-ship/gxspl-ship.xml
      - test -f $PREFIX/share/genie-splines-ship/PROVENANCE

about:
  homepage: https://github.com/ShipSoft/ship-conda-recipes
  summary: GENIE cross-section splines for SHiP target nuclei
  description: |
    Pre-computed GENIE cross-section splines (gmkspl output, tune
    ${{ tune }}) for the SHiP target/absorber nuclei, for use with
    gevgen --cross-sections / $GENIE_XSEC_FILE. The installed
    PROVENANCE file records how the splines were produced. Production
    packages (build string production_*, built by the splines.yml
    workflow) cover all neutrino flavours on the SHiP nuclide list up
    to 400 GeV; smoke packages (build string smoke_*, from regular
    recipe CI) contain a reduced validation set only.
  license: GPL-3.0-or-later

extra:
  recipe-maintainers:
    - olantwin
