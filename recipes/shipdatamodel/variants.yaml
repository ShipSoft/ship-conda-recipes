# Build against the selected ROOT C++ standard. root_cxx_standard is a variant
# key: it is folded into the package hash and build.sh reads it as
# $root_cxx_standard.
#
# root_base must be pinned explicitly as well. A bare `root_base` host spec
# resolves, under root_cxx_standard 23, to the legacy pre-cxx-split root_base
# 6.36.06 -- that build declares no root_cxx_standard dependency, so it
# spuriously satisfies the C++23 marker and the solver prefers it. Pinning keeps
# every recipe on the same ROOT series (as conda-forge's global root_base pin
# does). Bump in lockstep when conda-forge moves ROOT past 6.40.2.
root_cxx_standard:
  - "20"
  - "23"
root_base:
  - "6.40.2"
