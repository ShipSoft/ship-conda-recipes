context:
  version: "0.1.0"

package:
  name: shipdatamodel
  version: ${{ version }}

source:
  url: https://github.com/ShipSoft/data-model/archive/refs/tags/v${{ version }}.tar.gz
  sha256: a1d562620632cf272d1d91dae0a94332db489b93cc512ca8cdc42c507616766c

build:
  number: 3
  skip:
    - win
  script: build.sh

requirements:
  build:
    - ${{ compiler('cxx') }}
    - sysroot_linux-64 2.17.*
    - cmake
    - make
  host:
    - root_base
    - root_cxx_standard
  run_exports:
    - ${{ pin_subpackage('shipdatamodel', upper_bound='x.x') }}

tests:
  - script:
      - test -f $PREFIX/lib/libSHiPDataModel.so
      - test -f $PREFIX/lib/libSHiPDataModel.rootmap
      - test -f $PREFIX/lib/libSHiPDataModel_rdict.pcm
      - test -f $PREFIX/lib/cmake/SHiPDataModel/SHiPDataModelConfig.cmake
      - test -f $PREFIX/include/SHiP/MCParticle.hpp

about:
  homepage: https://github.com/ShipSoft/data-model
  repository: https://github.com/ShipSoft/data-model
  summary: Event data model for the SHiP experiment
  description: |
    SHiPDataModel provides the C++ event data classes for the SHiP
    experiment, with ROOT dictionary support for I/O via TTree and
    RNTuple. The classes (MCParticle, SimHit, SimParticle, SimResult)
    are plain structs with default member initialisers and are
    consumed by downstream SHiP simulation, digitisation and
    reconstruction packages.
  license: LGPL-3.0-or-later
  license_file: LICENSES/LGPL-3.0-or-later.txt

extra:
  recipe-maintainers:
    - olantwin
