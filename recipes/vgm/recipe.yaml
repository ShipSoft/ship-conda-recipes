context:
  version: "5.4"
  tag: "v5-4"

package:
  name: vgm
  version: ${{ version }}

source:
  url: https://github.com/vmc-project/vgm/archive/refs/tags/${{ tag }}.tar.gz
  sha256: f503f541f65a7184a386e83b021cdd6c96e78fbc2be65f1ce583d39c1375aca4

build:
  number: 4
  script: build.sh

requirements:
  build:
    - ${{ compiler('cxx') }}
    - sysroot_linux-64 2.17.*
    - cmake
    - make
  host:
    - root 6.40.*
    - geant4 11.4.*
    - xerces-c
  run:
    - root 6.40.*
    - geant4 11.4.*
    - xerces-c
  run_exports:
    - root 6.40.*
    - geant4 11.4.*

tests:
  - script:
      - test -f $PREFIX/lib/libBaseVGM.a
      - test -d $PREFIX/include/VGM
