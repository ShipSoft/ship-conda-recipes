context:
  version: "5-4"

package:
  name: vgm
  version: ${{ version | replace("-", ".") }}

source:
  url: https://github.com/vmc-project/vgm/archive/refs/tags/v${{ version }}.tar.gz
  sha256: f503f541f65a7184a386e83b021cdd6c96e78fbc2be65f1ce583d39c1375aca4

build:
  number: 5
  script: build.sh

requirements:
  build:
    - ${{ compiler('cxx') }}
    - sysroot_linux-64 2.17.*
    - cmake
    - make
  host:
    - root_base 6.40.*
    - root_cxx_standard
    - geant4 11.4.*
    - xerces-c
  run:
    - root_base 6.40.*
    - root_cxx_standard
    - geant4 11.4.*
    - xerces-c
  run_exports:
    - root_base 6.40.*
    - root_cxx_standard
    - geant4 11.4.*

tests:
  - script:
      - test -f $PREFIX/lib/libBaseVGM.a
      - test -d $PREFIX/include/VGM

about:
  homepage: https://vmc-project.github.io
  repository: https://github.com/vmc-project/vgm
  summary: Virtual Geometry Model — Geant4 / ROOT TGeo geometry conversion
  description: |
    VGM (Virtual Geometry Model) is a geometry conversion tool that
    provides bidirectional conversion between the Geant4 and ROOT
    TGeo geometry models. Its design allows additional geometry
    models to be integrated by implementing a single sub-module
    rather than writing bilateral converters between every pair of
    existing models.
  license: GPL-3.0-or-later
  license_file: LICENSE

extra:
  recipe-maintainers:
    - olantwin
