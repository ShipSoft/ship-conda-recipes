context:
  version: "2.3.0"
  # Upstream tag format uses zero-padded "MM-mm-pp" instead of SemVer.
  tag: "02-03-00"

package:
  name: genfit
  version: ${{ version }}

source:
  url: https://github.com/GenFit/GenFit/archive/refs/tags/${{ tag }}.tar.gz
  sha256: 741eb6cbfccc3403061cd4ccd62083adf3f9b187ea4236453eef777d4824b05e
  patches:
    - fix-dictionary-paths.patch

build:
  number: 8
  script: build.sh

requirements:
  build:
    - ${{ compiler('cxx') }}
    - sysroot_linux-64 2.17.*
    - cmake
    - make
  host:
    - root_base
    - root_cxx_standard
    - gtest
  run_exports:
    - ${{ pin_subpackage('genfit', upper_bound='x.x') }}

tests:
  - script:
      - test -f $PREFIX/lib/libgenfit2.so
      - test -f $PREFIX/include/AbsFitter.h

about:
  homepage: https://github.com/GenFit/GenFit
  repository: https://github.com/GenFit/GenFit
  summary: Experiment-independent track-fitting toolkit
  description: |
    GenFit is a generic, experiment-independent framework for track
    reconstruction in particle and nuclear physics. It provides three
    modular components: track-fitting algorithms (Kalman Filter,
    Deterministic Annealing Filter and others), track representations
    with material- and field-aware extrapolation, and a flexible
    measurement interface supporting TPCs, wire chambers and other
    detector types.
  license: LGPL-3.0-or-later
  license_file: LICENSE.md

extra:
  recipe-maintainers:
    - olantwin
