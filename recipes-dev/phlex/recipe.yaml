# Dev twin of the conda-forge phlex-feedstock recipe
# (https://github.com/conda-forge/phlex-feedstock, recipe/recipe.yaml) —
# refresh on feedstock changes. Differences: the source is a git ref (set by
# scripts/build-phlex-pr.sh) instead of the release tarball, the build number
# is 9999 with a pr_<rev> build string so local channels win any comparison
# against the released build, and the variant matrix is fixed to the C++23 /
# Python 3.13 combination the SHiP stack uses. Lives under recipes-dev/ so
# the build-all task (recipes/ only) never publishes it.
context:
  version: "0.3.0"
  git_rev: main

package:
  name: phlex
  version: ${{ version }}

source:
  git: https://github.com/Framework-R-D/phlex.git
  rev: ${{ git_rev }}

build:
  number: 9999
  string: pr_${{ git_rev[:9] }}_9999
  skip:
    # phlex requires GCC 15 (libstdc++ 15 for std::vector(from_range, ...))
    # and is not yet supported on macOS (libc++ lacks std::jthread)
    - win
    - osx
  script: build.sh

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - cmake
    - make
    - pkg-config
  host:
    - cetmodules
    - libboost-devel
    - fmt
    - tbb-devel
    - spdlog
    - libjsonnet
    # required by the python/numba plugin (plugins/python)
    - libffi
    - python >=3.12
    - numpy
    - root_base
    - root_cxx_standard
  run:
    - python
  run_exports:
    - ${{ pin_subpackage('phlex', upper_bound='x.x') }}

tests:
  - package_contents:
      lib:
        - phlex_core

about:
  homepage: https://github.com/Framework-R-D/phlex
  repository: https://github.com/Framework-R-D/phlex
  summary: Parallel, Hierarchical, and Layered Execution of data-processing algorithms
  license: Apache-2.0
  license_file: LICENSE
